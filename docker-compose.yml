version: "3.9"

services:
  # --- 基础设施 (profile: infra) ---
  postgres:
    image: postgres:16-alpine
    profiles: ["infra"]
    environment:
      POSTGRES_DB: retrieval_db
      POSTGRES_USER: retrieval
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-retrieval}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retrieval"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    profiles: ["infra"]
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123} --maxmemory 4gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 5s
      retries: 5

  # --- AI 模型服务 (profile: ai-local) ---
  model-service:
    build:
      context: .
      dockerfile: services/model/Dockerfile
      args:
        EXTRAS: ${MODEL_EXTRAS:-cpu,gemma4}
    profiles: ["ai-local"]
    environment:
      MODEL_NAME: ${MODEL_NAME:-google/gemma-4-e4b}
      MODEL_CACHE_DIR: /models
      DEVICE: ${DEVICE:-cpu}
    volumes:
      - model_cache:/models
    ports:
      - "8100:8100"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 5

  # --- 业务服务 (profile: core) ---
  eval-service:
    build:
      context: .
      dockerfile: services/eval/Dockerfile
    profiles: ["core"]
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      model-service: {condition: service_healthy}

  eval-worker:
    build:
      context: .
      dockerfile: services/eval/Dockerfile.worker
    profiles: ["core"]
    command: ["celery", "-A", "services.eval.src.workers.celery_app", "worker", "-Q", "eval", "--loglevel=info"]
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      model-service: {condition: service_healthy}

  # --- Gitea (profile: gitea) ---
  gitea:
    image: gitea/gitea:1.25
    profiles: ["gitea"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - GITEA__server__ROOT_URL=http://localhost:3000/
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=postgres:5432
      - GITEA__database__NAME=retrieval_db
      - GITEA__database__USER=retrieval
      - GITEA__database__PASSWD=${POSTGRES_PASSWORD:-retrieval}
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - gitea_data:/data
    depends_on:
      postgres: {condition: service_healthy}
    restart: always

volumes:
  postgres_data:
  redis_data:
  model_cache:
  gitea_data: